<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dashMonitor - Iniciar sesión</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 2px 16px rgba(0,0,0,.06);transition:box-shadow .2s}
.login-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:52px;height:52px;background:linear-gradient(135deg,#0d6efd,#0a58ca);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:26px;margin-bottom:8px}
.logo h1{font-size:20px;font-weight:600;color:#1a1a2e;margin:0}
.logo p{font-size:13px;color:#6c757d;margin:4px 0 0}
.form-control{border-radius:10px;padding:11px 14px;font-size:14px;border:1.5px solid #e0e3e8;background:#fafbfc;transition:border-color .2s,box-shadow .2s}
.form-control:focus{border-color:#0d6efd;box-shadow:0 0 0 3px rgba(13,110,253,.12);background:#fff}
.form-control::placeholder{color:#adb5bd}
.input-group-text{border-radius:10px;border:1.5px solid #e0e3e8;background:#fafbfc;color:#6c757d;font-size:14px;padding:11px 14px}
.login-btn{border-radius:10px;padding:11px;font-size:15px;font-weight:500;background:#0d6efd;border:none;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.6}
.alert{border-radius:10px;font-size:13px;padding:10px 14px;margin-bottom:16px}
.form-label{font-size:13px;font-weight:500;color:#495057;margin-bottom:4px}
.footer-text{text-align:center;margin-top:24px;font-size:12px;color:#adb5bd}
.spinner-border{width:16px;height:16px;border-width:2px;margin-right:6px;vertical-align:middle}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon"><i class="bi bi-speedometer2"></i></div>
    <h1>dashMonitor</h1>
    <p>Panel de monitoreo del servidor</p>
  </div>

  <div id="login-error" class="alert alert-danger d-none py-2"></div>

  <div class="mb-3">
    <label class="form-label" for="login-user">Usuario</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
      <input id="login-user" class="form-control" placeholder="Nombre de usuario" autocomplete="username" autocapitalize="off" spellcheck="false">
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="login-pass">Contraseña</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input id="login-pass" class="form-control" type="password" placeholder="Contraseña" autocomplete="current-password">
    </div>
  </div>

  <button id="login-btn" class="login-btn btn btn-primary w-100">
    <span id="login-btn-text">Iniciar sesión</span>
    <span id="login-btn-spinner" class="d-none"><span class="spinner-border spinner-border-sm" role="status"></span>Ingresando...</span>
  </button>

  <div class="footer-text">dashMonitor &mdash; Monitoreo en tiempo real</div>
</div>

<script>
(function() {
  var userInput = document.getElementById('login-user');
  var passInput = document.getElementById('login-pass');
  var btn = document.getElementById('login-btn');
  var btnText = document.getElementById('login-btn-text');
  var btnSpinner = document.getElementById('login-btn-spinner');
  var errorDiv = document.getElementById('login-error');

  function showError(msg) {
    errorDiv.textContent = msg;
    errorDiv.classList.remove('d-none');
  }

  function setLoading(loading) {
    btn.disabled = loading;
    btnText.classList.toggle('d-none', loading);
    btnSpinner.classList.toggle('d-none', !loading);
  }

  function doLogin() {
    var user = userInput.value.trim();
    var pass = passInput.value;
    if (!user || !pass) {
      showError('Complete ambos campos');
      return;
    }
    errorDiv.classList.add('d-none');
    setLoading(true);
    fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    }).then(function(r) {
      return r.json().then(function(d) {
        if (!r.ok) throw new Error(d.detail || 'Error de autenticación');
        return d;
      });
    }).then(function(data) {
      localStorage.setItem('dashmonitor_token', data.access_token);
      localStorage.setItem('dashmonitor_refresh', data.refresh_token);
      window.location.href = '/';
    }).catch(function(err) {
      setLoading(false);
      showError(err.message);
    });
  }

  btn.addEventListener('click', doLogin);
  passInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  userInput.focus();
})();
</script>
</body>
</html>
